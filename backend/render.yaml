services:
  - type: web
    name: raidex-backend
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 server_sqlite.py
    envVars:
      - key: ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: PAYMENT_PROVIDER
        value: razorpay
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PORT
        value: 8000
