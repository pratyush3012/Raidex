[pytest]
python_files = test_*.py
testpaths = backend/tests
asyncio_mode = strict

[coverage:run]
omit =
    backend/configure_razorpay.py
    backend/server_sqlite.py
    backend/setup_mongodb.py
    backend/test_connection.py
    backend/test_razorpay.py
    backend/tests/*

[coverage:report]
show_missing = true
skip_covered = false
